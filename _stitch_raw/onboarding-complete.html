<script>
        // Simple confetti effect for success state
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            
            // Adjust canvas to match the panel size
            const panel = canvas.parentElement;
            canvas.width = panel.offsetWidth;
            canvas.height = panel.offsetHeight;

            const particles = [];
            const colors = ['#2563EB', '#004ac6', '#dbe1ff', '#b4c5ff'];

            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 50, // Start slightly below center
                    r: Math.random() * 4 + 2,
                    dx: Math.random() * 10 - 5,
                    dy: Math.random() * -10 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;

                particles.forEach(p => {
                    if (p.life > 0) {
                        active = true;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${hexToRgb(p.color)}, ${p.life})`;
                        ctx.fill();

                        p.x += p.dx;
                        p.y += p.dy;
                        p.dy += 0.5; // Gravity
                        p.life -= 0.02; // Fade out
                    }
                });

                if (active) {
                    requestAnimationFrame(animate);
                }
            }

            function hexToRgb(hex) {
                let r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                return `${r},${g},${b}`;
            }

            // Start animation after checkmark completes
            setTimeout(() => {
                animate();
            }, 1000);
            
             window.addEventListener('resize', () => {
                canvas.width = panel.offsetWidth;
                canvas.height = panel.offsetHeight;
            });
        });
    </script>
