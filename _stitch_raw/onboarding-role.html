<style>
        body {
            /* Applying base background and text color from theme */
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Shadow for ambient depth */
        .ambient-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }
        .hover-lift {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        /* Hide radio inputs visually but keep them accessible */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Selection styling logic via CSS based on radio state */
        input[type="radio"]:checked + div {
            border-color: theme('colors.primary');
            background-color: theme('colors.primary-fixed');
        }
        input[type="radio"]:checked + div .icon-container {
            color: theme('colors.on-primary-fixed-variant');
            font-variation-settings: 'FILL' 1; /* Fill icon on selection */
        }
        input[type="radio"]:checked + div .label-text {
            color: theme('colors.on-primary-fixed-variant');
            font-weight: 600;
        }
        
        /* Focus ring for accessibility */
        input[type="radio"]:focus-visible + div {
            outline: 2px solid theme('colors.primary');
            outline-offset: 2px;
        }
    </style>

<body class="min-h-screen flex flex-col items-center justify-center p-sm md:p-gutter font-body-md antialiased relative overflow-hidden">

<script>
        // Simple script to enable the 'Continue' button only when a selection is made
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('onboarding-form');
            const radioButtons = form.querySelectorAll('input[type="radio"]');
            const btnContinue = document.getElementById('btn-continue');

            function checkSelection() {
                const isSelected = Array.from(radioButtons).some(radio => radio.checked);
                btnContinue.disabled = !isSelected;
            }

            radioButtons.forEach(radio => {
                radio.addEventListener('change', checkSelection);
            });
            
            // Prevent default form submission for demo purposes
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                // Add success animation or transition logic here
                btnContinue.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span>';
                setTimeout(() => {
                    alert('Chuyển sang Bước 3...');
                    btnContinue.innerHTML = 'Tiếp tục <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
                }, 800);
            });
        });
    </script>
