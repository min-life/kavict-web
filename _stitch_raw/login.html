<body class="bg-background min-h-screen flex items-center justify-center p-sm md:p-md text-on-surface font-body-md antialiased">
<!-- Main Container -->
<main class="w-full max-w-[460px] bg-surface-container-lowest rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.04)] p-lg md:p-xl flex flex-col gap-lg">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-md">
<img alt="KAVICT Logo" class="h-12 w-auto mb-xs" src="https://lh3.googleusercontent.com/aida/AP1WRLsw9C38IEcFBVvYTdnNr0NaSTgwG6OOiMy5-Sx5fpZjHqeaXWFJII0vlvdjcDyeOHRKUvoI77-v_p-Y6gyXZAPmclSCXPiE_xeDp8d0GOMinqmERdh3DDK_qtlI6BRZST0WCLyXlA9v1vu_WtLVrHHtAJuvxfR28K2RZvoOikxy1v3g4NH4AaffxwQUDRqkbokny37nQytdcQZqdUK6H0hCUnUIHNJREcK_l23-kNXHA2AY3pLuW20LO54">
<div>
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">Đăng nhập</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Chào mừng bạn quay trở lại! Tiếp tục hành trình học tài chính cùng KAVICT.</p>
</div>
</header>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full h-12 pl-[44px] pr-sm rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 transition-all outline-none" id="email" name="email" placeholder="Nhập địa chỉ email" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full h-12 pl-[44px] pr-[44px] rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 transition-all outline-none" id="password" name="password" placeholder="Nhập mật khẩu" type="password">
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between mt-[-8px]">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary-container focus:ring-primary-container focus:ring-offset-0 bg-surface-container-lowest transition-all cursor-pointer" type="checkbox">
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Ghi nhớ đăng nhập</span>
</label>
<a class="font-label-sm text-label-sm text-primary-container hover:text-primary transition-colors" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary-container text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary transition-colors focus:ring-4 focus:ring-primary-container/20 focus:outline-none mt-xs" type="submit">
                Đăng nhập
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">hoặc</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- Social Login -->
<button class="w-full h-12 flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors focus:ring-4 focus:ring-outline-variant/20 focus:outline-none" type="button">

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Tiếp tục với Google</span>
</button>

<p class="text-center font-body-md text-body-md text-on-surface-variant mt-xs">
            Chưa có tài khoản? <a class="text-primary-container font-label-md text-label-md hover:text-primary transition-colors" href="#">Đăng ký ngay</a>
</p>
